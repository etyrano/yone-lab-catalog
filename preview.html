<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Y.ONE LAB · 미리보기 (Desktop + Mobile)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif; background:#1A1F2E; color:#FFFFFF; padding:24px; min-height:100vh; }
  .header { display:flex; align-items:center; justify-content:space-between; margin:0 0 20px; padding:0 8px; }
  .header h1 { font-size:14px; font-weight:600; letter-spacing:2px; color:#C9A87A; }
  .header .info { font-size:11px; color:#9BA5B5; letter-spacing:0.5px; }
  .stage { display:grid; grid-template-columns:1fr 420px; gap:24px; }
  .panel { background:#FFFFFF; border-radius:8px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .panel-label { background:#0A1F44; color:#C9A87A; padding:10px 16px; font-size:11px; font-weight:600; letter-spacing:2px; display:flex; align-items:center; justify-content:space-between; }
  .panel-label .device { color:#FFFFFF; font-weight:500; font-size:10.5px; }
  .frame-desktop { width:100%; height:calc(100vh - 110px); border:none; display:block; background:#FFFFFF; }
  .frame-mobile { width:100%; height:calc(100vh - 110px); border:none; display:block; background:#FFFFFF; }
  .mobile-wrap { padding:16px; background:#0A1F44; }
  .mobile-device { width:390px; max-width:100%; height:calc(100vh - 150px); margin:0 auto; background:#FFFFFF; border:6px solid #061331; border-radius:24px; overflow:hidden; box-shadow:0 12px 32px rgba(0,0,0,0.5); }
  .mobile-device iframe { width:100%; height:100%; border:none; }
  @media (max-width: 1100px) {
    .stage { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Y.ONE LAB · CATALOG PREVIEW</h1>
    <div class="info">데스크탑 + 모바일 동시 미리보기</div>
  </div>
  <div class="stage">
    <div class="panel">
      <div class="panel-label">DESKTOP <span class="device">1200px+</span></div>
      <iframe class="frame-desktop" src="index.html"></iframe>
    </div>
    <div class="panel">
      <div class="panel-label">MOBILE <span class="device">iPhone 14 Pro · 390px</span></div>
      <div class="mobile-wrap">
        <div class="mobile-device">
          <iframe src="index.html"></iframe>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
